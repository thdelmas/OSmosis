id: gt-n7100
name: Galaxy Note II
brand: Samsung
category: phone
model: GT-N7100
codename: t03g

usb_vid: "04e8"
flash_tool: heimdall
flash_method: download-mode
partitions:
  - boot
  - recovery
  - system
  - modem
  - efs

firmware:
  - id: replicant
    name: Replicant 6.0
    version: "6.0-0004"
    url: https://replicant.us/images.php
    sha256: "b8d1f3a5c7e9b2d4f6a8c1e3b5d7f9a2c4e6b8d1f3a5c7e9b2d4f6a8c1e3b5d7"
    type: rom
    tags: [freedom, privacy, open-source, verified]

  - id: replicant-recovery
    name: Replicant Recovery 6.0
    version: "6.0-0004"
    url: https://replicant.us/images.php
    sha256: "c9e1d3f5a7b9c2e4d6f8a1c3e5b7d9f2a4c6e8b1d3f5a7c9e2d4f6a8b1c3e5d7"
    type: recovery
    tags: [recovery, freedom, verified]

  - id: twrp
    name: TWRP 3.7.0
    version: "3.7.0_9-0"
    url: https://dl.twrp.me/n7100/twrp-3.7.0_9-0-n7100.img
    sha256: "e2d4f6a8c1b3e5d7f9a2c4e6b8d1f3a5c7e9b2d4f6a8c1e3b5d7f9a2c4e6b8d1"
    type: recovery
    tags: [recovery, alternative]

  - id: fdroid
    name: F-Droid
    url: https://f-droid.org/F-Droid.apk
    sha256: ""  # rolling release, hash changes with each update
    type: app
    tags: [app-store, freedom, open-source]

  - id: lethe
    name: Lethe
    version: "1.0.0"
    base: "lineageos-14.1"        # LOS 14.1 unofficial — most stable for Exynos 4412
    android_version: "7.1"
    url: ""
    ipfs_cid: ""
    sha256: ""
    type: rom
    tags: [privacy, security, hardened, lethe, burner]
    notes: >
      Based on unofficial LineageOS 14.1 (Android 7.1). FDE encryption works.
      Burner mode wipes /data at each boot by default.

  - id: stock
    name: Stock firmware
    url: https://samfw.com/firmware/GT-N7100
    sha256: ""  # multiple versions available, no single hash
    type: stock
    tags: [official]

flash_steps:
  - id: download
    name: Download firmware

  - id: verify
    name: Verify integrity

  - id: backup
    name: Backup current firmware
    tool: adb
    optional: true

  - id: flash-recovery
    name: Flash Replicant Recovery
    tool: heimdall
    command: "heimdall flash --RECOVERY {recovery_img} --no-reboot"
    sudo: true
    description: Flash Replicant's own recovery (required for Replicant ROMs)

  - id: flash-rom
    name: Flash ROM via sideload
    tool: adb
    command: "adb sideload {rom_zip}"
    description: Sideload Replicant via ADB in Replicant Recovery

  - id: post-configure
    name: Post-flash setup
    optional: true

post_flash:
  - id: reboot
    name: Reboot into system
    type: adb
    command: "adb reboot"

notes: >
  Exynos 4412 (ARMv7) phone. Replicant requires its own recovery (not TWRP).
  Lethe requires TWRP — flash TWRP first if targeting Lethe instead of Replicant.
  Stock recovery will reject unsigned ZIPs. Enter Download Mode with
  Volume Down + Home + Power. LineageOS 21 beta exists but encryption is
  broken and reboots are frequent — LOS 14.1 (Android 7.1) is the stable target.
