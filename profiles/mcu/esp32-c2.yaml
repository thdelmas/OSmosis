id: esp32-c2
name: ESP32-C2 DevKit
brand: Espressif
category: mcu
flash_tool: esptool
usb_vid: 303A
usb_pid: '1001'
notes: RISC-V single-core, ultra-low-cost (also ESP8684)
flash_steps:
- id: download
  name: Download firmware
- id: verify
  name: Verify integrity
- id: flash
  name: Flash firmware
  tool: esptool
  command: --chip esp32c2
- id: post-configure
  name: Post-flash setup
  optional: true
