id: arduino-uno
name: Arduino Uno
brand: Arduino
category: mcu
flash_tool: arduino-cli
usb_vid: '2341'
usb_pid: '0043'
notes: ATmega328P, 16 MHz
flash_steps:
- id: download
  name: Download firmware
- id: verify
  name: Verify integrity
- id: flash
  name: Flash firmware
  tool: arduino-cli
  command: --fqbn arduino:avr:uno
- id: post-configure
  name: Post-flash setup
  optional: true
