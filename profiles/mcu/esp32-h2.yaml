id: esp32-h2
name: ESP32-H2 DevKit
brand: Espressif
category: mcu
flash_tool: esptool
usb_vid: 303A
usb_pid: '1001'
notes: RISC-V, Thread/Zigbee only (no WiFi)
flash_steps:
- id: download
  name: Download firmware
- id: verify
  name: Verify integrity
- id: flash
  name: Flash firmware
  tool: esptool
  command: --chip esp32h2
- id: post-configure
  name: Post-flash setup
  optional: true
