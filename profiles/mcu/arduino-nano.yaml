id: arduino-nano
name: Arduino Nano
brand: Arduino
category: mcu
flash_tool: arduino-cli
usb_vid: '0403'
usb_pid: '6001'
notes: ATmega328P, old bootloader uses 57600 baud
flash_steps:
- id: download
  name: Download firmware
- id: verify
  name: Verify integrity
- id: flash
  name: Flash firmware
  tool: arduino-cli
  command: --fqbn arduino:avr:nano
- id: post-configure
  name: Post-flash setup
  optional: true
