id: rpi-3b
name: Raspberry Pi 3 Model B
codename: rpi3b
brand: Raspberry Pi
category: sbc
soc: BCM2837
arch: arm64
ram: 1GB
revision: "1.2"
notes: >
  The Pi 3B v1.2 has a BCM2837 (quad-core Cortex-A53 @ 1.2GHz).
  Boots from SD card by default. USB boot requires a one-time OTP
  bit set via raspi-config or config.txt (program_usb_boot_mode=1).

flash_tool: dd
flash_method: sd-card

