flash_steps:
  - id: insert-sd
    name: Insert your SD card
    description: >
      Insert a microSD card (8GB minimum, 32GB recommended) into your
      computer's SD card reader. If using a USB adapter, plug it in now.

  - id: select-os
    name: Select an OS image
    description: >
      Choose which operating system to install from the list above.
      Raspberry Pi OS is recommended for most users.

  - id: flash
    name: Flash the image
    tool: dd
    command: "dd if={image} of={sd_device} bs=4M status=progress conv=fsync"
    sudo: true
    description: >
      OSmosis will download the image, verify its checksum, decompress it,
      and write it to the SD card. This may take several minutes.

  - id: configure
    name: Configure (optional)
    optional: true
    description: >
      After flashing, OSmosis can pre-configure WiFi credentials, enable SSH,
      and set a hostname on the boot partition — so the Pi boots ready to use
      headlessly.

  - id: insert-pi
    name: Insert SD card into Pi
    description: >
      Remove the SD card from your computer and insert it into the Pi 3B's
      microSD slot on the underside of the board.

  - id: power-on
    name: Power on
    description: >
      Connect a 5V/2.5A micro-USB power supply to the Pi. The green ACT LED
      will flicker as it boots. First boot may take 1-3 minutes.

support_status: supported
