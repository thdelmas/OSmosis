id: gt-n7105
name: Galaxy Note II LTE
brand: Samsung
category: phone
model: GT-N7105
codename: t0lte

usb_vid: "04e8"
flash_tool: heimdall
flash_method: download-mode
partitions:
  - boot
  - recovery
  - system
  - cache
  - hidden
  - userdata
  - modem
  - bootloader

# Maps the filenames inside a SAMFW.COM_* zip's BL/AP/CP/CSC tarballs
# to the Heimdall partition flag names used by this device's PIT.
# Verified against the live PIT (T0LTE_EUR_OPEN.pit) — this device uses
# the older-Samsung naming: BOOTLOADER (not SBOOT), TZSW, RADIO (not MODEM).
heimdall_partition_map:
  sboot.bin:       BOOTLOADER
  param.bin:       PARAM
  tz.img:          TZSW
  boot.img:        BOOT
  recovery.img:    RECOVERY
  system.img:      SYSTEM
  system.img.ext4: SYSTEM
  cache.img:       CACHE
  cache.img.ext4:  CACHE
  hidden.img:      HIDDEN
  hidden.img.ext4: HIDDEN
  userdata.img:    USERDATA
  tombstones.img:  TOMBSTONES
  modem.bin:       RADIO

firmware:
  - id: twrp
    name: TWRP 3.7.0
    version: "3.7.0_9-0"
    url: https://dl.twrp.me/t0lte/twrp-3.7.0_9-0-t0lte.img
    sha256: ""  # fill in after first verified download
    type: recovery
    tags: [recovery]

  - id: fdroid
    name: F-Droid
    url: https://f-droid.org/F-Droid.apk
    sha256: ""  # rolling release
    type: app
    tags: [app-store, freedom, open-source]

  - id: lethe
    name: Lethe
    version: "1.0.0"
    base: "lineageos-14.1"        # LOS 14.1 unofficial — most stable for Exynos 4412
    android_version: "7.1"
    url: ""
    ipfs_cid: ""
    sha256: ""
    type: rom
    tags: [privacy, security, hardened, lethe, burner]
    notes: >
      Based on unofficial LineageOS 14.1 (Android 7.1). FDE encryption available
      but not forced (Note II's Exynos 4412 has no hardware crypto, so FDE adds
      noticeable boot/runtime overhead). Burner mode wipes /data at each boot
      by default. See lethe/docs/release/v1.0.0-build-notes.md for known gotchas.

  - id: stock
    name: Stock firmware (Samsung)
    filename: SAMFW.COM_GT-N7105_FTM_N7105XXUFQH1_fac.zip
    android_version: "4.4.2"   # KitKat — final official update for Note II
    version: "N7105XXUFQH1/N7105FTMFQH1/N7105XXUFQG1"  # PDA / CSC / PHONE (Samsung triplet)
    region: FTM   # Free Mobile France — the CSC the IPFS pin matches
    size_bytes: 1305654249
    url: https://samfw.com/firmware/GT-N7105
    ipfs_cid: bafybeifoilbkblne2fsmndaw4y7snckqxk4otroq54jz5pffe2eutwa7k4
    sha256: a064ccad2f1505851eb16539f46a7c5aeeded0bf90615cc80c9c0ba205fff2e3
    type: stock
    tags: [official]
    notes: >
      Build ~mid-2014. AP=N7105XXUFQH1 (REV04), CSC=N7105FTMFQH1 (FTM/France),
      CP=N7105XXUFQG1. The IPFS pin matches this exact zip; for other regional
      CSCs (OPE, BTU, XEU, …) use samfw.com — no IPFS pin yet.
      Tarball pattern: BL_*.tar.md5 + AP_*.tar.md5 + CP_*.tar.md5 + CSC_*.tar.md5.

flash_steps:
  - id: download
    name: Download stock firmware

  - id: verify
    name: Verify integrity

  - id: enter-download-mode
    name: Enter Download Mode
    description: >
      Hold Power + Home + Volume Down until the warning screen appears, then
      press Volume Up to confirm. Connect USB after the device is in Download
      Mode.

  - id: flash-stock
    name: Flash stock firmware (full reset)
    tool: heimdall
    sudo: true
    command: "recover-t0lte.sh"
    description: >
      Recovery flash — re-writes BOOT, RECOVERY, SYSTEM, CACHE, HIDDEN,
      USERDATA, MODEM (and BOOTLOADER if present). Wipes all user data.

  - id: flash-twrp
    name: Flash TWRP recovery
    tool: heimdall
    sudo: true
    command: "heimdall flash --RECOVERY {twrp_img} --no-reboot"
    description: Replace stock recovery with TWRP for sideloading custom ROMs.

  - id: flash-rom
    name: Flash ROM via sideload
    tool: adb
    command: "adb sideload {rom_zip}"
    description: Sideload Lethe (or other unofficial LOS 14.1 builds) via TWRP.

post_flash:
  - id: reboot
    name: Reboot into system
    type: adb
    command: "adb reboot"

notes: >
  Exynos 4412 (ARMv7) phone with LTE modem (separate from t03g, the 3G variant).
  TWRP on this device sometimes reports `ro.product.device=t03g` and
  `ro.product.model=GT-N7100`; ignore those — the real device is GT-N7105/t0lte
  (confirmed via `ro.bootloader=N7105XXUFQH1`). Lethe OTAs for t0lte must be
  sideloaded with `lethe-resign.sh` (strip the codename assert) because of this
  mismatch — see scripts/lethe-resign.sh in the lethe submodule.

  Replicant does NOT officially support t0lte (LTE) — only t03g. Use TWRP +
  unofficial LineageOS 14.1 if you want a free-software-leaning ROM here.
  Stock recovery rejects unsigned ZIPs; flash TWRP first if targeting Lethe.

  Enter Download Mode: Power + Home + Volume Down, then Volume Up to confirm.
