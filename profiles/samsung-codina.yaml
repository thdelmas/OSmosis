id: gt-i8160
name: Galaxy Ace 2
brand: Samsung
category: phone
model: GT-I8160
codename: codina

usb_vid: "04e8"
flash_tool: heimdall
flash_method: download-mode
soc: ST-Ericsson NovaThor U8500
cpu: Dual Cortex-A9 @ 800MHz
gpu: Mali-400 MP1
ram_mb: 768
storage_mb: 4096
display: 3.8" 480x800 PLS
partitions:
  - boot
  - recovery
  - system
  - modem
  - cache

variants:
  - model: GT-I8160
    notes: Vanilla
  - model: GT-I8160chn
    notes: Chinese market
  - model: GT-I8160I
  - model: GT-I8160L
  - model: GT-I8160P
    notes: Has NFC (PNX544 chip, antenna in back plate)

adb_props:
  ro.product.model: GT-I8160
  ro.product.device: codina

firmware:
  - id: bender
    name: Bender OS (postmarketOS)
    version: "v24.12"
    url: ""
    ipfs_cid: ""
    sha256: ""
    type: agent-os
    tags: [voice-first, ai-agent, mainline-linux, bender]
    build:
      base: pmos
      suite: v24.12
      agent_template: bender
      target_device: samsung-codina
    notes: >
      Voice-first AI agent OS built on postmarketOS with mainline Linux kernel.
      Boots into Bender agent interface — no Android, no app store.
      Requires OSmosis kernel patches for display and audio (applied automatically).

  - id: pmos
    name: postmarketOS
    version: "v24.12"
    url: https://images.postmarketos.org/bpo/v24.12/samsung-codina/
    sha256: ""
    type: rom
    tags: [mainline-linux, open-source, privacy]
    notes: >
      Mainline Linux on the Ace 2 via postmarketOS. Testing tier — display and
      audio require OSmosis kernel patches. WiFi, touchscreen, GPU (Lima) work.

  - id: stock
    name: Stock firmware
    url: https://samfw.com/firmware/GT-I8160
    sha256: ""
    type: stock
    tags: [official]

flash_steps:
  - id: download
    name: Download firmware
    description: Download or build the selected firmware image

  - id: verify
    name: Verify integrity
    description: Check SHA256 hash of downloaded image

  - id: backup
    name: Backup current firmware
    tool: adb
    description: Back up current partitions via ADB before flashing
    optional: true

  - id: flash-uboot
    name: Flash U-Boot bootloader
    tool: heimdall
    command: "heimdall flash --BOOT u-boot.img --no-reboot"
    sudo: true
    description: >
      Flash U-Boot stemmy to the boot partition. U-Boot replaces Samsung's
      secondary bootloader and provides fastboot mode for loading the
      mainline Linux kernel. This is the first step for any pmOS install.
    notes: >
      The Samsung primary bootloader (PBL) remains intact — U-Boot is
      chain-loaded from it. If U-Boot fails, you can still enter Download
      Mode and re-flash stock boot.img to recover.
    physical_buttons:
      enter_download_mode: "Volume Down + Home + Power"
      confirm_download: "Volume Up to confirm"
      timer_seconds: 3

  - id: flash-rootfs
    name: Flash rootfs to USERDATA
    tool: heimdall
    command: "heimdall flash --USERDATA {rootfs_img} --no-reboot"
    sudo: true
    description: >
      Flash the postmarketOS rootfs image to the USERDATA partition.
      On the Ace 2, USERDATA is the largest partition (~2GB) and is
      used as the root filesystem for pmOS.

  - id: flash-kernel
    name: Flash kernel
    tool: heimdall
    command: "heimdall flash --RECOVERY {boot_img} --no-reboot"
    sudo: true
    description: >
      Flash the pmOS boot image (kernel + initramfs + DTB) to the
      RECOVERY partition. U-Boot loads the kernel from this partition.
    notes: >
      The RECOVERY partition is repurposed for the mainline kernel.
      Stock Android recovery is replaced. To return to stock, re-flash
      both BOOT (stock bootloader) and RECOVERY (stock recovery).

  - id: reboot
    name: Reboot into Bender
    description: >
      Remove USB cable, then hold Volume Up + Home + Power for 3 seconds
      to boot. U-Boot will load the mainline kernel from RECOVERY, which
      mounts rootfs from USERDATA.
    physical_buttons:
      reboot_combo: "Volume Up + Home + Power"
      timer_seconds: 3
    notes: >
      First boot takes 30-60 seconds as pmOS initializes. After that,
      boots take ~15 seconds. Bender will greet you by voice once the
      agent server starts.

post_flash:
  - id: connect-wifi
    name: Connect to WiFi
    description: >
      On first boot, connect via USB networking (SSH to 172.16.42.1) and
      configure WiFi with connmanctl. Once connected, Bender's web UI
      is available at http://bender.local:8080 or the device's IP.
    commands:
      - "ssh bender@172.16.42.1"
      - "sudo connmanctl enable wifi"
      - "sudo connmanctl scan wifi"
      - "sudo connmanctl services"
      - "sudo connmanctl connect wifi_<service_id>"

  - id: setup-api-key
    name: Set up API key
    description: >
      Open http://bender.local:8080 in a browser (or on the device screen
      if display patches are applied). Paste your Anthropic API key or
      scan a QR code. Bender will introduce itself and ask what you want
      to use the device for.

known_issues:
  - id: battery-brick-risk
    severity: critical
    description: >
      If the battery fully depletes, the device cannot charge because it
      cannot boot to the kernel, and it cannot boot if battery is too low
      (shuts down before reaching kernel). This is also the case on Android.
      Recovery requires an external battery charger or a replacement battery.

  - id: bluetooth-no-bdaddr
    severity: minor
    description: >
      Bluetooth has no device address set after boot. Must manually configure:
      apk add bluez-btmgmt && btmgmt public-addr <bdaddr>

  - id: dsi-scaling-phosh
    severity: minor
    description: >
      Phosh may have wrong DSI scaling, making the lockscreen unusable.
      Fix: set scale = 1 in /usr/share/phosh/phoc.ini under [output:DSI-1].

  - id: usb-networking-timing
    severity: minor
    description: >
      USB networking only works if USB is plugged in while "postmarketOS
      Loading..." is shown. Timing-sensitive.

  - id: speed-cap
    severity: info
    description: >
      All Codina variants use PRCMU firmware "U8420" that caps CPU to
      ~800MHz instead of the ~1GHz the SoC supports. Likely a pure
      software restriction.

  - id: uboot-boot-partition-blocked
    severity: critical
    description: >
      Real-world testing on one GT-I8160 unit showed the SBL ignores the
      Kernel PIT partition entirely — flashing U-Boot, mainline zImage, or
      garbage to it has zero effect. SBL partition is read-only (Heimdall
      rejects writes). Secure boot fuses are NOT blown; the issue is
      partition mapping. The pmOS wiki U-Boot path may work on other units
      but failed on ours. Android app route is the viable alternative.

sensors:
  - STMicroelectronics LIS3DH accelerometer
  - Alps HSCDTD008A magnetometer
  - Amstaos TMD2672 light and proximity sensor

pmos_status:
  tier: testing
  working:
    - touchscreen
    - wifi
    - 3d-acceleration
    - bluetooth (manual bdaddr required)
    - proximity-sensor
    - haptics
    - u-boot
    - display
  broken:
    - camera
    - camera-flash
    - gps
    - modem-calls
    - modem-sms
    - modem-data

notes: >
  NovaThor U8500 phone with 768MB RAM and 4GB storage. Tight but viable
  for Bender — the agent server runs locally, inference is cloud-side.

  postmarketOS support is at "testing" tier. OSmosis provides kernel
  patches for display (MCDE DPI + WS2401 panel) and audio (MSP I2S +
  AB8500 codec) that are not yet upstream.

  Boot chain: Samsung PBL → U-Boot stemmy → mainline kernel (6.x)
  CAVEAT: U-Boot path failed on our test unit (SBL ignores Kernel PIT
  partition). Android app route is the current viable path.

  Enter Download Mode: Volume Down + Home + Power.
  Two panel variants exist (LMS380KF01 90%, S6D27A1 10%) — U-Boot
  auto-detects via Samsung's lcdtype ATAG.

  GPS chip: Broadcom BCM4751 (broken in pmOS).
  NFC: PNX544, only on GT-I8160P variant (antenna in back plate).
