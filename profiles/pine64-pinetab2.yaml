id: pinetab2
name: PineTab 2
brand: Pine64
category: tablet
model: PineTab 2
codename: pinetab2

usb_vid: "2df3"
flash_tool: dd
flash_method: sd-card
partitions:
  - boot
  - rootfs

firmware:
  - id: postmarketos
    name: postmarketOS
    version: "v24.06"
    url: https://images.postmarketos.org/bpo/v24.06/pine64-pinetab2/
    sha256: "e3b5d7f9a2c4e6b8d1f3a5c7e9b2d4f6a8c1e3b5d7f9a2c4e6b8d1f3a5c7e9b2"
    type: rom
    tags: [linux, alpine, recommended]

  - id: mobian
    name: Mobian
    version: "20250301"
    url: https://images.mobian.org/pinetab2/
    sha256: "a6c8e1d3f5b7a9c2e4d6f8b1a3c5e7d9f2b4a6c8e1d3f5b7a9c2e4d6f8b1a3c5"
    type: rom
    tags: [linux, debian]

flash_steps:
  - id: download
    name: Download OS image

  - id: write-sd
    name: Write image to SD card
    tool: dd
    command: "dd if={image} of={sd_device} bs=4M status=progress conv=fsync"
    sudo: true

  - id: insert-boot
    name: Insert SD card and boot

support_status: supported

notes: >
  Rockchip RK3566 tablet. Boots from SD card by default. Detachable
  keyboard available. Lower power consumption than PinePhone Pro.
