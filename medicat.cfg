# id|label|min_usb_gb|ventoy_required|notes
#
# Medicat USB — bootable PC repair, diagnostics, and recovery toolkit.
# Contains Windows PE environments, antivirus scanners, disk utilities,
# password recovery, and hardware diagnostics.
#
# Medicat uses Ventoy as its boot manager. The workflow is:
#   1. Install Ventoy on the USB drive
#   2. Copy the Medicat files (VHDs, ISOs) to the Ventoy partition
#   3. Boot from USB — Ventoy presents a menu of all available tools
#
# The user must supply their own Medicat download (not redistributable).
#
medicat-full|Medicat USB (Full)|64|yes|Full toolkit: Mini Windows 10/11 PE, antivirus (Kaspersky, ESET, Malwarebytes), disk tools (GParted, Clonezilla, DBAN), password reset, hardware diagnostics. Requires 64 GB+ USB.
medicat-lite|Medicat USB (Lite)|32|yes|Lighter build without full Windows PE environments. Includes antivirus, disk utilities, and boot repair tools. 32 GB+ USB.
