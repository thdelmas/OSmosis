# Bafang mid-drive motors
# =====================================================================
bafang-bbshd|Bafang BBSHD 1000W|Bafang|bafang-bbshd|stlink|bbs-fw|https://github.com/danielnilsson9/bbs-fw|supported|STM8S. 48V 1000W mid-drive. Most popular mod target.
bafang-bbshd-48v30a|Bafang BBSHD 48V 30A|Bafang|bafang-bbshd|stlink|bbs-fw|https://github.com/danielnilsson9/bbs-fw|supported|High-power variant
bafang-bbs02-750|Bafang BBS02B 750W|Bafang|bafang-bbs02|stlink|bbs-fw|https://github.com/danielnilsson9/bbs-fw|supported|STM8S. 48V 750W mid-drive.
bafang-bbs02-500|Bafang BBS02B 500W|Bafang|bafang-bbs02|stlink|bbs-fw|https://github.com/danielnilsson9/bbs-fw|supported|STM8S. 48V 500W mid-drive.
bafang-bbs01-350|Bafang BBS01B 350W|Bafang|bafang-bbs02|stlink|bbs-fw|https://github.com/danielnilsson9/bbs-fw|experimental|Older BBS01 — limited testing
bafang-m500|Bafang M500|Bafang|bafang-m500|uart||https://github.com/OpenSourceEBike|planned|CAN bus controller. No open FW yet.
